const parseDT = (s) => { if (!s || !String(s).trim()) return null; const d = new Date(String(s).trim().replace(" ", "T")); return isNaN(d) ? null : d; };
const fmtDur = (h) => { if (h == null) return "—"; const a = Math.abs(h); if (a < 1) { const m = Math.round(a * 60); return `${m}\u00A0min${m === 1 ? "" : "s"}`; } const hh = Math.floor(a); const mm = Math.round((a - hh) * 60); const hStr = `${hh}\u00A0hour${hh === 1 ? "" : "s"}`; return mm ? `${hStr}, ${mm}\u00A0min${mm === 1 ? "" : "s"}` : hStr; };
/* fmtDays: cumulative hours shown days-first, e.g. 107h → "4 days, 11 hours". Non-breaking
   spaces keep each unit intact so a wrap only ever falls after the comma. */
const fmtDays = (h) => { if (h == null) return "—"; const t = Math.round(h); const d = Math.floor(t / 24); const hh = t % 24; const hStr = `${hh}\u00A0hour${hh === 1 ? "" : "s"}`; if (d <= 0) return hStr; return `${d}\u00A0day${d > 1 ? "s" : ""}${hh ? `, ${hStr}` : ""}`; };
/* workHoursLost: portion of an outage falling inside Mon–Fri 08:00–16:00 (an 8h work day). */
const workHoursLost = (start, end) => {
  if (!start || !end || end <= start) return 0;
  let total = 0; let cur = new Date(start.getFullYear(), start.getMonth(), start.getDate());
  const S = start.getTime(), E = end.getTime();
  while (cur.getTime() < E) {
    const dow = cur.getDay();
    if (dow >= 1 && dow <= 5) {
      const ws = new Date(cur); ws.setHours(8, 0, 0, 0);
      const we = new Date(cur); we.setHours(16, 0, 0, 0);
      const s = Math.max(S, ws.getTime()), e = Math.min(E, we.getTime());
      if (e > s) total += (e - s) / 3600000;
    }
    cur.setDate(cur.getDate() + 1);
  }
  return total;
};

/* ════════ RESIDENT ════════ */
function Resident({ data, communities, community, setCommunity }) {
  const mine = useMemo(() => (!community ? [] : data.filter((r) => isIslandWide(r) || splitList(r.affected_communities).includes(community))), [data, community]);
  const restored = mine.filter((r) => r._actualH != null);
  const avgDur = average(restored.map((r) => r._actualH));
  const planned = mine.filter((r) => /^planned/i.test(r.outage_status)).length;
  const unplanned = mine.filter((r) => /unplanned/i.test(r.outage_status)).length;
  const withBoth = mine.filter((r) => r._est && r._act && !r._actApprox);
  const onTime = withBoth.filter((r) => r._lateH <= 0).length;
  const onTimeRate = withBoth.length ? Math.round((onTime / withBoth.length) * 100) : null;
  const ongoing = mine.filter((r) => r.restoration_status === "Ongoing");
  const totalWithout = restored.reduce((s, r) => s + r._actualH, 0);
  const workLost = restored.reduce((s, r) => s + workHoursLost(r._start, r._act), 0);
  const workDays = workLost / 8;
  const fewRecords = mine.length > 0 && mine.length < 4;

  const heat = useMemo(() => {
    const g = DOW.map(() => DAYPARTS.map(() => 0));
    mine.forEach((r) => { if (!r._start) return; const di = (r._start.getDay() + 6) % 7; const h = r._start.getHours(); const pi = DAYPARTS.findIndex(([, a, b]) => h >= a && h < b); if (pi >= 0) g[di][pi]++; });
    return { g, max: Math.max(1, ...g.flat()) };
  }, [mine]);

  return (
    <div>
      <div style={{ display: "flex", gap: 12, alignItems: "center", marginBottom: 18, flexWrap: "wrap" }}>
        <div style={{ position: "relative" }}>
          <Search size={15} style={{ position: "absolute", left: 12, top: 12, color: C.faint }} />
          <select value={community} onChange={(e) => setCommunity(e.target.value)} style={{ appearance: "none", background: C.panel, color: community ? C.ink : C.sub, border: `1px solid ${C.line}`, borderRadius: 10, padding: "10px 14px 10px 35px", fontSize: 14, minWidth: 280, fontFamily: F.body }}>
            <option value="">Find your community…</option>
            {communities.map((c) => <option key={c} value={c}>{c}</option>)}
          </select>
        </div>
        {community && <div style={{ fontSize: 13, color: C.sub }}>Island-wide outages are counted here too — they affect everyone.</div>}
      </div>

      {!community ? (
        <Card style={{ padding: 44, textAlign: "center", background: `linear-gradient(180deg, ${C.amberWash}, ${C.panel})` }}>
          <div style={{ width: 52, height: 52, borderRadius: 999, background: C.panel, border: `1px solid ${C.line}`, display: "grid", placeItems: "center", margin: "0 auto" }}>
            <Home size={24} color={C.amber} />
          </div>
          <div style={{ marginTop: 16, fontSize: 15.5, color: C.sub, maxWidth: 460, marginLeft: "auto", marginRight: "auto", lineHeight: 1.55 }}>Pick your community to see how often the power goes out where you live, how long it usually lasts, and whether restorations run on time.</div>
        </Card>
      ) : (
        <>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 12, marginBottom: 18 }}>
            <Stat label="Outages on record" value={mine.length} hint={`affecting ${community}`} />
            <Stat label="Typical outage length" value={fmtDur(avgDur)} hint="average time without power" accent={C.amber} />
            <Stat label={"Total time\nwithout power"} value={fmtDays(totalWithout)} hint={`based on ${restored.length} announced restored outages`} accent={C.amber} />
            <Stat label="Work hours without power" value={`${Math.round(workLost)} hours`} hint={workLost ? `≈ ${workDays < 10 ? workDays.toFixed(1) : Math.round(workDays)} work days (8h each)` : "none in work hours"} accent={C.slate} />
            <Stat label="Planned vs unplanned" value={`${planned} / ${unplanned}`} hint="scheduled / unexpected" accent={C.slate} />
            <Stat label="Restored on time" value={onTimeRate == null ? "—" : `${onTimeRate}%`} hint={withBoth.length ? `vs DOMLEC's first estimate · ${withBoth.length} had an estimate to compare` : "no estimates to compare"} accent={onTimeRate != null && onTimeRate < 60 ? C.rose : C.green} />
          </div>
          {fewRecords && (
            <div style={{ display: "flex", gap: 10, alignItems: "flex-start", padding: "12px 15px", borderRadius: 12, background: C.amberWash, border: `1px solid ${C.amberSoft}`, marginBottom: 18 }}>
              <AlertTriangle size={16} color={C.amberDeep} style={{ flexShrink: 0, marginTop: 1 }} />
              <div style={{ fontSize: 12.5, color: C.sub, lineHeight: 1.55 }}>Only {mine.length} outage{mine.length > 1 ? "s" : ""} on record for {community} so far — these figures may not yet be representative of what's typical here.</div>
            </div>
          )}
          <div style={{ display: "grid", gap: 18 }}>
            <Card>
              <SectionTitle sub="Most recent first">Outages affecting {community}</SectionTitle>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {[...mine].sort((a, b) => (b._start || 0) - (a._start || 0)).slice(0, 8).map((r) => (
                  <div key={r.outage_id} style={{ display: "flex", justifyContent: "space-between", gap: 12, padding: "11px 13px", background: C.panel2, borderRadius: 10, borderLeft: `3px solid ${r.restoration_status === "Ongoing" ? C.rose : /unplanned/i.test(r.outage_status) ? C.amber : C.slate}` }}>
                    <div style={{ minWidth: 0 }}>
                      <div style={{ fontSize: 13.5, color: C.ink }}>{r._start ? r._start.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" }) : "—"} · <span style={{ color: C.sub }}>{r.cause_category}</span>{isIslandWide(r) && <span style={{ color: C.amberDeep, fontWeight: 600 }}> · island-wide</span>}</div>
                      <div style={{ fontSize: 12, color: C.faint, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{r.cause || "Reason not stated"}</div>
                    </div>
                    <div style={{ textAlign: "right", fontFamily: F.mono, fontSize: 12, whiteSpace: "nowrap" }}>
                      <div style={{ color: C.ink }}>{fmtDur(r._actualH)}</div>
                      <div style={{ color: r.restoration_status === "Ongoing" ? C.rose : C.faint }}>{r.restoration_status}</div>
                    </div>
                  </div>
                ))}
              </div>
            </Card>
            <Card>
              <SectionTitle sub={`Only outages affecting ${community}, by start time`}>When do outages tend to start?</SectionTitle>
              <div style={{ display: "grid", gridTemplateColumns: "44px repeat(4,1fr)", gap: 5, fontSize: 11 }}>
                <div />
                {DAYPARTS.map(([n]) => <div key={n} style={{ color: C.faint, textAlign: "center", paddingBottom: 4, fontWeight: 500 }}>{n}</div>)}
                {DOW.map((d, di) => (
                  <React.Fragment key={d}>
                    <div style={{ color: C.faint, display: "flex", alignItems: "center", fontWeight: 500 }}>{d}</div>
                    {DAYPARTS.map(([n], pi) => { const v = heat.g[di][pi]; const o = v / heat.max; return <div key={n} title={`${d} ${n}: ${v}`} style={{ height: 36, borderRadius: 7, background: v ? `rgba(207,122,22,${0.14 + o * 0.78})` : C.panel2, border: `1px solid ${v ? "transparent" : C.lineSoft}`, display: "grid", placeItems: "center", color: o > 0.5 ? "#fff" : C.sub, fontFamily: F.mono }}>{v || ""}</div>; })}
                  </React.Fragment>
                ))}
              </div>
            </Card>
          </div>
        </>
      )}
    </div>
  );
}

/* ════════ ANALYST ════════ */
function Analyst({ data }) {
  const [showMethod, setShowMethod] = useState(false);
  const [selectedMonth, setSelectedMonth] = useState("");

  const MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const fmtMonth = (k) => `${MONTH_NAMES[parseInt(k.slice(5), 10) - 1]} ${k.slice(0, 4)}`;
  const months = useMemo(() => {
    const s = new Set();
    data.forEach((r) => { if (r._start) s.add(monthKey(r._start)); });
    return [...s].sort();
  }, [data]);

  const filtered = useMemo(() => selectedMonth ? data.filter((r) => r._start && monthKey(r._start) === selectedMonth) : data, [data, selectedMonth]);

  const total = filtered.length;
  const unplanned = filtered.filter((r) => /unplanned/i.test(r.outage_status)).length;
  const ongoing = filtered.filter((r) => r.restoration_status === "Ongoing").length;
  const restored = filtered.filter((r) => r._actualH != null);
  const avgDur = average(restored.map((r) => r._actualH));
  const withBoth = filtered.filter((r) => r._est && r._act && !r._actApprox);
  const late = withBoth.filter((r) => r._lateH > 0);
  const onTimeRate = withBoth.length ? Math.round(((withBoth.length - late.length) / withBoth.length) * 100) : null;
  const avgLate = late.length ? late.reduce((s, r) => s + r._lateH, 0) / late.length : null;
  const totalWithout = restored.reduce((s, r) => s + r._actualH, 0);
  const workLost = restored.reduce((s, r) => s + workHoursLost(r._start, r._act), 0);
  const workDays = workLost / 8;

  const byMonth = useMemo(() => { const m = {}; data.forEach((r) => { if (!r._start) return; const k = monthKey(r._start); (m[k] ??= { month: k, count: 0, mo: r._start.getMonth() + 1 }).count++; }); return Object.values(m).sort((a, b) => a.month.localeCompare(b.month)).map((x) => ({ ...x, label: `${MONTH_NAMES[x.mo - 1].slice(0, 3)} ${x.month.slice(0, 4)}`, selected: x.month === selectedMonth })); }, [data, selectedMonth]);
  const byCause = useMemo(() => { const m = {}; filtered.forEach((r) => { const k = r.cause_category || "Unknown"; m[k] = (m[k] || 0) + 1; }); return Object.entries(m).map(([name, value]) => ({ name, value })).sort((a, b) => b.value - a.value); }, [filtered]);
  const byParish = useMemo(() => { const m = {}; filtered.forEach((r) => { (isIslandWide(r) ? ["Island-wide"] : splitList(r.parishes)).forEach((p) => (m[p] = (m[p] || 0) + 1)); }); return Object.entries(m).map(([name, value]) => ({ name, value })).sort((a, b) => b.value - a.value); }, [filtered]);
  const buckets = [["<1h", 0, 1], ["1–2h", 1, 2], ["2–4h", 2, 4], ["4–8h", 4, 8], ["8–24h", 8, 24], [">24h", 24, 1e9]];
  const byDur = useMemo(() => buckets.map(([label, a, b]) => ({ label, value: restored.filter((r) => r._actualH >= a && r._actualH < b).length })), [restored]);

  /* hurricane-season band (Jun–Nov) drawn behind the monthly chart */
  const hurrLabels = byMonth.filter((m) => HURRICANE.has(m.mo)).map((m) => m.label);
  const hurrBand = hurrLabels.length ? { x1: hurrLabels[0], x2: hurrLabels[hurrLabels.length - 1] } : null;

  const chart = (children) => <ResponsiveContainer width="100%" height={210}>{children}</ResponsiveContainer>;

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
        <span style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: ".08em", color: C.faint, fontWeight: 600 }}>Filter by month</span>
        <select value={selectedMonth} onChange={(e) => setSelectedMonth(e.target.value)} style={{ background: C.panel, color: selectedMonth ? C.ink : C.sub, border: `1px solid ${C.line}`, borderRadius: 8, padding: "6px 11px", fontSize: 12, fontFamily: F.mono }}>
          <option value="">All months</option>
          {months.map((m) => <option key={m} value={m}>{fmtMonth(m)}</option>)}
        </select>
        {selectedMonth && <button onClick={() => setSelectedMonth("")} style={{ cursor: "pointer", fontSize: 11, padding: "5px 9px", borderRadius: 7, border: `1px solid ${C.line}`, background: C.panel, color: C.sub, fontFamily: F.body }}>✕ Clear</button>}
      </div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 12, marginBottom: 20 }}>
        <Stat label="Total outages" value={total} hint={selectedMonth ? fmtMonth(selectedMonth) : undefined} />
        <Stat label="Unplanned" value={total ? `${Math.round((unplanned / total) * 100)}%` : "—"} hint={`${unplanned} of ${total} outages`} accent={C.amber} />
        <Stat label="Average duration" value={fmtDur(avgDur)} hint={`based on ${restored.length} announced restored outages`} accent={C.slate} />
        <Stat label={"Total time\nwithout power"} value={fmtDays(totalWithout)} hint={`based on ${restored.length} announced restored outages`} accent={C.amber} />
        <Stat label="Work hours without power" value={`${Math.round(workLost)} hours`} hint={workLost ? `≈ ${workDays < 10 ? workDays.toFixed(1) : Math.round(workDays)} work days (8h each)` : "none in work hours"} accent={C.slate} />
        <Stat label="Restored on time" value={onTimeRate == null ? "—" : `${onTimeRate}%`} hint={avgLate ? `vs first estimate · late avg ${fmtDur(avgLate)} over` : `vs DOMLEC's first estimate`} accent={onTimeRate != null && onTimeRate < 60 ? C.rose : C.green} />
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(300px,1fr))", gap: 18 }}>
        <Card>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 10, flexWrap: "wrap" }}>
            <SectionTitle sub={selectedMonth ? "Click another bar to switch month · Clear to reset" : "Click a bar to filter by month"}>Outages per month</SectionTitle>
            <div style={{ display: "inline-flex", alignItems: "center", gap: 12, fontSize: 11, color: C.sub, fontWeight: 600 }}>
              <span style={{ display: "inline-flex", alignItems: "center", gap: 5 }}><span style={{ width: 9, height: 9, borderRadius: 2, background: C.slate }} /> Outages</span>
              <span style={{ display: "inline-flex", alignItems: "center", gap: 5, color: C.amberDeep }}><span style={{ width: 11, height: 11, borderRadius: 2, background: "rgba(207,122,22,.12)", border: `1px solid ${C.amberSoft}` }} /> Hurricane season · Jun–Nov</span>
              {selectedMonth && <span style={{ display: "inline-flex", alignItems: "center", gap: 5, color: C.ink }}><span style={{ width: 9, height: 9, borderRadius: 2, background: C.ink }} /> Selected</span>}
            </div>
          </div>
          {chart(<BarChart data={byMonth} margin={{ top: 4, right: 8, left: -18, bottom: 0 }} onClick={(e) => { if (e?.activePayload?.[0]) { const m = e.activePayload[0].payload.month; setSelectedMonth(m === selectedMonth ? "" : m); } }}>
            <CartesianGrid stroke={C.lineSoft} vertical={false} />
            {hurrBand && <ReferenceArea x1={hurrBand.x1} x2={hurrBand.x2} fill={C.amber} fillOpacity={0.1} stroke={C.amberSoft} strokeOpacity={0.8} ifOverflow="extendDomain" />}
            <XAxis dataKey="label" interval={0} height={36} tick={<MonthTick />} tickLine={false} axisLine={{ stroke: C.line }} /><YAxis allowDecimals={false} tick={{ fill: C.sub, fontSize: 11, fontFamily: F.mono }} tickLine={false} axisLine={false} />
            <Tooltip contentStyle={tip} cursor={{ fill: "rgba(42,33,18,.05)" }} /><Bar dataKey="count" name="outages" radius={[4, 4, 0, 0]} style={{ cursor: "pointer" }}>{byMonth.map((m, i) => <Cell key={i} fill={m.month === selectedMonth ? C.ink : C.slate} opacity={selectedMonth && m.month !== selectedMonth ? 0.4 : 1} />)}</Bar>
          </BarChart>)}
        </Card>
        <Card>
          <SectionTitle sub={selectedMonth ? `${fmtMonth(selectedMonth)} only` : "Reasons for the power outages"}>Causes</SectionTitle>
          {chart(<BarChart data={byCause} layout="vertical" margin={{ top: 4, right: 16, left: 10, bottom: 18 }}>
            <CartesianGrid stroke={C.lineSoft} horizontal={false} /><XAxis type="number" allowDecimals={false} tick={{ fill: C.sub, fontSize: 11, fontFamily: F.mono }} tickLine={false} axisLine={false} label={{ value: "number of outages", position: "insideBottom", offset: -6, fill: C.faint, fontSize: 10, fontFamily: F.body }} /><YAxis type="category" dataKey="name" width={120} interval={0} tick={{ fill: C.sub, fontSize: 11, fontFamily: F.body }} tickLine={false} axisLine={false} />
            <Tooltip contentStyle={tip} cursor={{ fill: "rgba(42,33,18,.05)" }} /><Bar dataKey="value" name="outages" fill={C.teal} radius={[0, 4, 4, 0]} maxBarSize={24} />
          </BarChart>)}
        </Card>
        <Card>
          <SectionTitle sub="How long outages lasted, counting only those with a confirmed end time">Duration</SectionTitle>
          {chart(<BarChart data={byDur} margin={{ top: 4, right: 8, left: 6, bottom: 0 }}>
            <CartesianGrid stroke={C.lineSoft} vertical={false} /><XAxis dataKey="label" tick={{ fill: C.sub, fontSize: 11, fontFamily: F.mono }} tickLine={false} axisLine={{ stroke: C.line }} /><YAxis allowDecimals={false} width={52} tick={{ fill: C.sub, fontSize: 11, fontFamily: F.mono }} tickLine={false} axisLine={false} label={{ value: "number of outages", angle: -90, position: "insideLeft", offset: 10, fill: C.faint, fontSize: 10, fontFamily: F.body, style: { textAnchor: "middle" } }} />
            <Tooltip contentStyle={tip} cursor={{ fill: "rgba(42,33,18,.05)" }} /><Bar dataKey="value" name="outages" fill={C.amber} radius={[4, 4, 0, 0]} />
          </BarChart>)}
        </Card>
        <Card>
          <SectionTitle sub="Island-wide shown separately">Outages by parish</SectionTitle>
          {chart(<BarChart data={byParish} layout="vertical" margin={{ top: 4, right: 16, left: 10, bottom: 0 }}>
            <CartesianGrid stroke={C.lineSoft} horizontal={false} /><XAxis type="number" allowDecimals={false} tick={{ fill: C.sub, fontSize: 11, fontFamily: F.mono }} tickLine={false} axisLine={false} /><YAxis type="category" dataKey="name" width={104} interval={0} tick={{ fill: C.sub, fontSize: 11, fontFamily: F.body }} tickLine={false} axisLine={false} />
            <Tooltip contentStyle={tip} cursor={{ fill: "rgba(42,33,18,.05)" }} /><Bar dataKey="value" name="outages" radius={[0, 4, 4, 0]} maxBarSize={24}>{byParish.map((p, i) => <Cell key={i} fill={p.name === "Island-wide" ? C.amber : C.slate} />)}</Bar>
          </BarChart>)}
        </Card>
      </div>
      <div style={{ marginTop: 18 }}>
        <button onClick={() => setShowMethod((v) => !v)} style={{ cursor: "pointer", background: C.panel, border: `1px solid ${C.line}`, color: C.sub, borderRadius: 9, padding: "7px 13px", fontSize: 12, fontFamily: F.body }}>
          {showMethod ? "Hide notes & caveats" : "ⓘ Notes & caveats"}
        </button>
        {showMethod && (
          <Card style={{ marginTop: 10, background: C.amberWash, borderColor: C.amberSoft }}>
            <div style={{ display: "flex", gap: 11 }}>
              <AlertTriangle size={18} color={C.amberDeep} style={{ flexShrink: 0, marginTop: 2 }} />
              <div style={{ fontSize: 12.5, color: C.sub, lineHeight: 1.65 }}>
                <div style={{ marginBottom: 10 }}>
                  <b style={{ color: C.ink }}>Assumed ends (~).</b>{" "}
                  Outages with no confirmed all-clear are assigned an assumed end — anchored to the stated estimate, or else start/notice + 24 h — and shown with a <span style={{ color: C.amberDeep, fontWeight: 600 }}>~</span> marker in the Data tab. These assumed ends are <b style={{ color: C.ink }}>excluded</b> from average duration, on-time rate, and the duration distribution, so those figures reflect only confirmed restorations.
                </div>
                <div style={{ marginBottom: 10 }}>
                  <b style={{ color: C.ink }}>~ on a time field</b> means the value is assumed or approximate — see that row's notes in the Data tab for the reasoning.
                </div>
                <div style={{ marginBottom: 10 }}>
                  <b style={{ color: C.ink }}>Reliability figures are event-based, not customer-weighted.</b>{" "}
                  True utility indices (SAIDI / SAIFI, per IEEE 1366) weight each event by customers affected, which these public notices don't report. Add a <code style={{ color: C.amberDeep, fontFamily: F.mono }}>customers_affected</code> or <code style={{ color: C.amberDeep, fontFamily: F.mono }}>population</code> column to enable population-weighted approximations. "On time" and lateness compare actual restoration to the utility's <i>first stated full-restoration estimate</i>.
                </div>
                <div style={{ marginBottom: 10 }}>
                  <b style={{ color: C.ink }}>Planned outages</b> appear at their scheduled window. <b style={{ color: C.ink }}>"Assumed restored"</b> means no all-clear was posted — the outage is presumed completed at the scheduled end with no evidence of delay or exception in later notices.
                </div>
                <div>
                  <b style={{ color: C.ink }}>Sources.</b>{" "}
                  Unplanned and emergency outages: DOMLEC public WhatsApp channel (notice graphics and text captions). Planned outages: DOMLEC WhatsApp channel and the DOMLEC website (<code style={{ color: C.amberDeep, fontFamily: F.mono }}>domlec.dm/outages</code>, planned notices only). All times Atlantic Standard Time (AST, UTC−4).
                </div>
              </div>
            </div>
          </Card>
        )}
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(OutageDashboard));
</script>
<script>
  (function(){
    var e=document.getElementById('err');
    function show(m){ e.hidden=false; e.textContent=String(m&&m.stack||m); }
    window.addEventListener('error',function(ev){ show(ev.error||ev.message); });
    window.addEventListener('unhandledrejection',function(ev){ show(ev.reason); });
  })();
</script>
</body>
</html>
